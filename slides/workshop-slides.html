<h1 id="what-is-ekohacks">What is Ekohacks?</h1>
<p><strong>ekohacks.com</strong> -- a space where developers train together.</p>
<p>Think of it as a <strong>coding dojo</strong>: you show up, you drill,<br />
you get better. No lectures. No passive watching.</p>
<ul>
<li>Pair up and <strong>write code</strong> every session</li>
<li>Drill fundamentals until they become <strong>second nature</strong></li>
<li>Build real software with <strong>discipline and craft</strong></li>
</ul>
</section>

<h1 id="why-this-dojo-exists">Why This Dojo Exists</h1>
<blockquote>
<p>&quot;An analyst designing a system without knowing how to program<br />
is like a priest performing a wedding --<br />
both can do the task, but neither knows what comes after.&quot;</p>
</blockquote>
<p>We believe <strong>craft matters</strong>. You can't design what you can't build.<br />

<h1 id="how-the-workshop-works">How the Workshop Works</h1>
<p>Every session follows the same rhythm:</p>
<ol>
<li><strong>Short theory</strong> -- just enough context to understand <em>why</em></li>
<li><strong>Live coding</strong> -- we build something together</li>
<li><strong>Kata drills</strong> -- you solve it yourself, one test at a time</li>
<li><strong>Vim breaks</strong> -- practice navigation between sessions</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  Theory --&gt; Live demo --&gt; Your turn --&gt; Vim drill --&gt; Repeat
</code></pre>
<p>No slides-only sessions. You write code from the first hour.</p>

<h1 id="the-pomodoro-technique">The Pomodoro Technique</h1>
<p>We structure the workshop in <strong>pomodoros</strong> -- focused blocks of work.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  25 min         5 min         25 min         5 min
+-----------+  +-------+  +-----------+  +-------+
|  FOCUS    |  | BREAK |  |  FOCUS    |  | BREAK |
| (theory)  |  | (vim  |  | (theory)  |  | (vim  |
|           |  | drill)|  |           |  | drill)|
+-----------+  +-------+  +-----------+  +-------+
</code></pre>
<h3 id="how-it-works">How it works</h3>
<ol>
<li><strong>25 minutes</strong> of focused theory or presentation</li>
<li><strong>5 minutes</strong> of hands-on Vim practice on an online tool</li>
<li>Repeat -- every break reinforces what you just learned</li>
</ol>
<blockquote>
<p>Pomodoro keeps you sharp. Vim drills build muscle memory.</p>
</blockquote>
</section>

<h1 id="why-vim">Why Vim?</h1>
<p>It's not about speed. It's about <strong>thinking</strong>.</p>
<p>Most developers type faster than they think. Vim reverses that.<br />
<strong>You think first. Then you act.</strong></p>
<p>When you can't reach for the mouse, you <strong>plan your edit</strong>.<br />
When you plan your edit, you make <strong>fewer mistakes</strong>.<br />
Fewer mistakes = <strong>faster overall</strong>.</p>
<p>In the age of AI, you still need to <strong>read</strong>, <strong>navigate</strong>, and <strong>edit</strong> fast.<br />
AI writes the first draft. Vim lets you sculpt it.</p>
</section>

<h1 id="vim-modes">Vim Modes</h1>
<p>Vim has <strong>6 modes</strong>. Each one has a purpose.</p>
<table>
<thead>
<tr>
<th>Mode</th>
<th>How to enter</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Normal</strong></td>
<td><code>Esc</code></td>
<td>Navigate, delete, copy, paste</td>
</tr>
<tr>
<td><strong>Insert</strong></td>
<td><code>i</code>, <code>a</code>, <code>o</code></td>
<td>Type new text</td>
</tr>
<tr>
<td><strong>Visual</strong></td>
<td><code>v</code>, <code>V</code>, <code>Ctrl-v</code></td>
<td>Select text</td>
</tr>
<tr>
<td><strong>Command</strong></td>
<td><code>:</code></td>
<td>Save, quit, search &amp; replace</td>
</tr>
<tr>
<td><strong>Replace</strong></td>
<td><code>R</code></td>
<td>Overwrite text in place</td>
</tr>
<tr>
<td><strong>Terminal</strong></td>
<td><code>:terminal</code></td>
<td>Run shell commands inside Vim</td>
</tr>
</tbody>
</table>
<p>You spend <strong>most time in Normal mode</strong>. That's the key insight.<br />
<em>Editing is not typing.</em></p>
</section>

<h1 id="normal-mode----your-home-base">Normal Mode -- Your Home Base</h1>
<p>This is where you <strong>think and move</strong>. Not where you type.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>w        jump to next word
b        jump back a word
0        start of line
$        end of line
gg       top of file
G        bottom of file
f(       jump to next (
/search  find text
*        find word under cursor
</code></pre>
<p><strong>Example:</strong> Jump to the 3rd occurrence of &quot;error&quot;:<br />
<code>/error</code> then press <code>n</code> twice.</p>
</section>

<h1 id="insert-mode----type-then-get-out">Insert Mode -- Type, Then Get Out</h1>
<p>Enter insert mode, type what you need, press <code>Esc</code>.</p>
<table>
<thead>
<tr>
<th>Key</th>
<th>Where it inserts</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>i</code></td>
<td>Before the cursor</td>
</tr>
<tr>
<td><code>a</code></td>
<td>After the cursor</td>
</tr>
<tr>
<td><code>o</code></td>
<td>New line below</td>
</tr>
<tr>
<td><code>O</code></td>
<td>New line above</td>
</tr>
<tr>
<td><code>I</code></td>
<td>Start of line</td>
</tr>
<tr>
<td><code>A</code></td>
<td>End of line</td>
</tr>
</tbody>
</table>
<p><strong>Example:</strong> You want to add a semicolon at the end of a line:<br />
<code>A;</code> then <code>Esc</code>. Done. Two keystrokes.</p>

<h1 id="visual-mode----select-with-purpose">Visual Mode -- Select With Purpose</h1>
<p>Three flavours of selection:</p>
<table>
<thead>
<tr>
<th>Key</th>
<th>Selects</th>
<th>Example use</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>v</code></td>
<td>Characters</td>
<td>Select part of a word</td>
</tr>
<tr>
<td><code>V</code></td>
<td>Whole lines</td>
<td>Select a block of code</td>
</tr>
<tr>
<td><code>Ctrl-v</code></td>
<td>Block/column</td>
<td>Edit multiple lines at once</td>
</tr>
</tbody>
</table>
<p><strong>Example:</strong> Delete 5 lines of code:<br />
<code>V</code> then <code>4j</code> then <code>d</code>. Selected 5 lines, deleted.</p>
<p><strong>Example:</strong> Add <code>//</code> comment to 10 lines:<br />
<code>Ctrl-v</code>, <code>9j</code>, <code>I</code>, <code>// </code>, <code>Esc</code>. Column insert on all 10.</p>
</section>

<h1 id="command-mode----power-commands">Command Mode -- Power Commands</h1>
<p>Press <code>:</code> from Normal mode.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>:w              save
:q              quit
:wq             save and quit
:q!             quit without saving
:%s/old/new/g   replace all &quot;old&quot; with &quot;new&quot; in file
:10,20s/a/b/g   replace only on lines 10-20
:!ls            run a shell command
:e filename     open another file
</code></pre>
<p><strong>Example:</strong> Rename a variable across the entire file:<br />
<code>:%s/userName/username/g</code></p>
</section>

<h1 id="replace--terminal-mode">Replace &amp; Terminal Mode</h1>
<h3 id="replace-mode-r">Replace Mode (<code>R</code>)</h3>
<p>Overwrites characters as you type -- like Insert/Overtype in other editors.</p>
<p><strong>Example:</strong> Fix a typo without deleting first:<br />
Move cursor to the wrong character, press <code>R</code>, type the correct one.</p>
<h3 id="terminal-mode-terminal">Terminal Mode (<code>:terminal</code>)</h3>
<p>Run shell commands without leaving Vim.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>:terminal        open a terminal split
:!npm test       run tests inline
:!git status     check git without switching windows
</code></pre>
<p><strong>Stay in Vim. Never leave.</strong></p>
</section>

<h1 id="the-essential-motions">The Essential Motions</h1>
<table>
<thead>
<tr>
<th>Key</th>
<th>Motion</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>h j k l</code></td>
<td>left, down, up, right</td>
</tr>
<tr>
<td><code>w / b</code></td>
<td>next word / back word</td>
</tr>
<tr>
<td><code>0 / $</code></td>
<td>start / end of line</td>
</tr>
<tr>
<td><code>gg / G</code></td>
<td>top / bottom of file</td>
</tr>
<tr>
<td><code>f{char}</code></td>
<td>jump to character</td>
</tr>
<tr>
<td><code>%</code></td>
<td>matching bracket</td>
</tr>
</tbody>
</table>
<p><strong>No arrow keys. No mouse.</strong> Your hands never leave home row.</p>
</section>

<h1 id="the-essential-verbs">The Essential Verbs</h1>
<table>
<thead>
<tr>
<th>Key</th>
<th>Action</th>
<th>Think...</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>d</code></td>
<td>Delete</td>
<td>&quot;delete...&quot;</td>
</tr>
<tr>
<td><code>c</code></td>
<td>Change</td>
<td>&quot;change...&quot;</td>
</tr>
<tr>
<td><code>y</code></td>
<td>Yank</td>
<td>&quot;copy...&quot;</td>
</tr>
<tr>
<td><code>v</code></td>
<td>Visual</td>
<td>&quot;select...&quot;</td>
</tr>
</tbody>
</table>
<p>Combine with motions:</p>
<ul>
<li><code>dw</code> -- delete word</li>
<li><code>ci&quot;</code> -- change inside quotes</li>
<li><code>yap</code> -- yank a paragraph</li>
</ul>
</section>

<h1 id="vim-is-a-language">Vim is a Language</h1>
<p>Now that you know motions and verbs -- here's the magic.<br />

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  VERB   +   MODIFIER   +   NOUN

   y    +      i        +    {      = yank inner braces
</code></pre>

<h1 id="vim-language----examples">Vim Language -- Examples</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  diw    delete inner word
         &quot;hello |world| today&quot;  --&gt;  &quot;hello | today&quot;

  ci&quot;    change inside quotes
         const x = &quot;|old value|&quot;  --&gt;  const x = &quot;|&quot;  (now in insert mode)

  da(    delete around parentheses
         calculate|(a, b)|  --&gt;  calculate|

  yap    yank a paragraph
         copies the entire paragraph under cursor to register

  vi{    visual select inside braces
         function() { |all this code gets selected| }

  dt,    delete till comma
         |firstName|, lastName  --&gt;  |, lastName

  cf)    change find )
         |doSomething(x)|  --&gt;  | (now in insert mode, replaces up to and including ))

  gUiw   uppercase inner word
         |hello|  --&gt;  |HELLO|
</code></pre>

<h3 id="exercise-1-no-arrow-keys">Exercise 1: No Arrow Keys</h3>

<h3 id="exercise-2-word-surgery">Exercise 2: Word Surgery</h3>
<p>Given: <code>const userName = &quot;oldValue&quot;;</code><br />

<h3 id="exercise-3-the-dot-command">Exercise 3: The Dot Command</h3>
<p>Make an edit. Press <code>.</code> to repeat it. Feel the power.</p>
<blockquote>
<p>The <code>.</code> command is the most powerful key in Vim.</p>
</blockquote>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code>       +-------+
       |  RED  |  &lt;-- Write a FAILING test
       +---+---+
           |
           v
      +----+----+
      |  GREEN  |  &lt;-- Make it PASS (minimum code)
      +----+----+
           |
           v
    +------+------+
    | REFACTOR    |  &lt;-- Clean up (tests still pass)
    +------+------+
           |
           +-------&gt; back to RED
</code></pre>
<p><span class="red">Red.</span> <span class="green">Green.</span> <span class="yellow">Refactor.</span> Repeat.</p>

<h1 id="why-tdd">Why TDD?</h1>
<p>It's not about testing. It's about <strong>thinking</strong>.</p>
<table>
<thead>
<tr>
<th>Without TDD</th>
<th>With TDD</th>
</tr>
</thead>
<tbody>
<tr>
<td>Write code, hope it works</td>
<td>Define behavior first</td>
</tr>
<tr>
<td>Debug for hours</td>
<td>Know exactly what broke</td>
</tr>
<tr>
<td>Fear of refactoring</td>
<td>Refactor with confidence</td>
</tr>
<tr>
<td>&quot;It works on my machine&quot;</td>
<td>Proof it works, everywhere</td>
</tr>
</tbody>
</table>
<blockquote>
<p>TDD makes you <strong>define the problem before solving it</strong>.</p>
</blockquote>
</section>

<h1 id="tdd-forces-you-to-think">TDD Forces You to Think</h1>
<p>Before writing any code, you must answer:</p>
<ol>
<li><strong>What</strong> should this function do?</li>
<li><strong>What</strong> inputs does it take?</li>
<li><strong>What</strong> output do I expect?</li>
<li><strong>What</strong> edge cases exist?</li>
</ol>
<p>These are <em>design</em> questions, not testing questions.</p>
<p><strong>TDD is a design tool disguised as a testing practice.</strong></p>

<h1 id="why-tdd-matters-even-more-with-ai">Why TDD Matters Even More with AI</h1>
<p>AI can generate code in seconds. But...</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>+--------------------------------------------------+
|                                                   |
|   AI writes code FAST.                            |
|                                                   |
|   But fast + wrong = WASTE.                       |
|                                                   |
|   TDD makes you SLOW DOWN and THINK               |
|   before accepting AI output.                     |
|                                                   |
+--------------------------------------------------+
</code></pre>

<h1 id="the-ai-problem">The AI Problem</h1>
<p>Without TDD + AI:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Ask AI to write a function
2. AI generates 50 lines
3. You glance at it... &quot;looks right&quot;
4. Ship it
5. Bug in production at 2 AM
</code></pre>
<p>With TDD + AI:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Write a failing test FIRST (you define the spec)
2. Ask AI to make it pass
3. AI generates code
4. Test passes? Good. Test fails? AI was wrong.
5. You caught it BEFORE production
</code></pre>
</section>

<h1 id="tdd-is-your-ai-safety-net">TDD is Your AI Safety Net</h1>
<blockquote>
<p>&quot;AI is your copilot. TDD is your flight plan.&quot;</p>
</blockquote>
<ul>
<li><strong>Tests define what correct means</strong> -- AI doesn't know your requirements</li>
<li><strong>Tests catch AI hallucinations</strong> -- code that looks right but isn't</li>
<li><strong>Tests let you refactor AI output</strong> -- clean it up with confidence</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  With tests           Without tests

  5 min write test     0 min (no test)
  2 min implement      10 min implement
  0 min debugging      60 min debugging
  --------             --------
  7 min total          70 min total
</code></pre>
<p><strong>TDD is slower per line. But faster per feature.</strong></p>
</section>

<h1 id="what-are-mocks">What Are Mocks?</h1>
<p>Mocks replace real dependencies with <strong>fake versions</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-comment">// &quot;Let&#x27;s pretend the database does this...&quot;</span>
<span class="hljs-keyword">const</span> mockDb = {
  <span class="hljs-attr">findUser</span>: vi.<span class="hljs-title function_">fn</span>().<span class="hljs-title function_">mockResolvedValue</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&#x27;Alice&#x27;</span> }),
};

<span class="hljs-comment">// Test using the fake</span>
<span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> mockDb.<span class="hljs-title function_">findUser</span>(<span class="hljs-string">&#x27;123&#x27;</span>);
<span class="hljs-title function_">expect</span>(mockDb.<span class="hljs-property">findUser</span>).<span class="hljs-title function_">toHaveBeenCalledWith</span>(<span class="hljs-string">&#x27;123&#x27;</span>);
</code></pre>
<p>You're testing that your code <strong>called a function</strong>.<br />
Not that it <strong>actually works</strong>.</p>
</section>

<h1 id="two-types-of-tests">Two Types of Tests</h1>
<h3 id="state-based-check-outputs">State-Based (check outputs)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-comment">// What came out? What changed?</span>
<span class="hljs-keyword">const</span> result = <span class="hljs-title function_">calculateTotal</span>(items);
<span class="hljs-title function_">expect</span>(result).<span class="hljs-title function_">toBe</span>(<span class="hljs-number">42</span>);
</code></pre>
<h3 id="interaction-based-check-calls----this-is-mocking">Interaction-Based (check calls) -- this is mocking</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-comment">// Was this function called with these args?</span>
<span class="hljs-title function_">expect</span>(mockService.<span class="hljs-property">save</span>).<span class="hljs-title function_">toHaveBeenCalledWith</span>(data);
</code></pre>
<p>State-based tests survive refactoring.<br />
Interaction-based tests <strong>break when you rename anything</strong>.</p>

<h1 id="james-shores-approach">James Shore's Approach</h1>
<p><strong>Testing Without Mocks</strong> -- a pattern language.</p>
<p>No broad integration tests. No mocks. No ignoring infrastructure.</p>
<p>Three key ideas:</p>
<ol>
<li><strong>A-Frame Architecture</strong> -- separate logic from infrastructure</li>
<li><strong>Overlapping Sociable Tests</strong> -- test with real dependencies</li>
<li><strong>Nullables</strong> -- production code with an &quot;off switch&quot;</li>
</ol>
</section>

<h1 id="the-a-frame-architecture">The A-Frame Architecture</h1>
<p>Logic and infrastructure are <strong>peers</strong>, not layers.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>        Application / UI
        /            \
       v              v
    Logic      Infrastructure
 (pure rules)  (DB, HTTP, files)
</code></pre>
<p>Values pass between them. The application layer orchestrates.</p>
<p>This is different from layered architecture -- logic does <strong>not</strong><br />
depend on infrastructure. They don't know about each other.</p>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">verifyGitHubSignature</span>(<span class="hljs-params">
  <span class="hljs-attr">rawBody</span>: <span class="hljs-built_in">string</span>,
  <span class="hljs-attr">signatureHeader</span>: <span class="hljs-built_in">string</span> | <span class="hljs-literal">undefined</span>,
  <span class="hljs-attr">secret</span>: <span class="hljs-built_in">string</span>
</span>): <span class="hljs-built_in">boolean</span> {
  <span class="hljs-keyword">if</span> (!signatureHeader?.<span class="hljs-title function_">startsWith</span>(<span class="hljs-string">&#x27;sha256=&#x27;</span>)) <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>;

  <span class="hljs-keyword">const</span> signature = signatureHeader.<span class="hljs-title function_">slice</span>(<span class="hljs-number">7</span>);
  <span class="hljs-keyword">const</span> expected = <span class="hljs-title function_">createHmac</span>(<span class="hljs-string">&#x27;sha256&#x27;</span>, secret)
    .<span class="hljs-title function_">update</span>(rawBody).<span class="hljs-title function_">digest</span>(<span class="hljs-string">&#x27;hex&#x27;</span>);

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-keyword">const</span> secret = <span class="hljs-string">&#x27;test-webhook-secret&#x27;</span>;

<h1 id="the-logic-sandwich">The Logic Sandwich</h1>
<p>The application layer follows a simple repeating pattern:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  1. READ    data from infrastructure
  2. PROCESS data with logic (pure)
  3. WRITE   results to infrastructure
</code></pre>
<p>From our <code>updateParticipantRank()</code> in <code>services/xp.ts</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">updateParticipantRank</span>(<span class="hljs-params">participantId</span>) {
  <span class="hljs-comment">// 1. READ from DB</span>
  <span class="hljs-keyword">const</span> participant = <span class="hljs-keyword">await</span> prisma.<span class="hljs-property">participant</span>.<span class="hljs-title function_">findUnique</span>({
    <span class="hljs-attr">where</span>: { <span class="hljs-attr">id</span>: participantId },
  });

  <span class="hljs-comment">// 2. PROCESS with pure logic</span>
  <span class="hljs-keyword">const</span> newRank = <span class="hljs-title function_">calculateRank</span>(participant.<span class="hljs-property">totalXP</span>);

  <span class="hljs-comment">// 3. WRITE back to DB</span>
  <span class="hljs-keyword">if</span> (newRank !== participant.<span class="hljs-property">currentRank</span>) {
    <span class="hljs-keyword">await</span> prisma.<span class="hljs-property">participant</span>.<span class="hljs-title function_">update</span>({
      <span class="hljs-attr">where</span>: { <span class="hljs-attr">id</span>: participantId },
      <span class="hljs-attr">data</span>: { <span class="hljs-attr">currentRank</span>: newRank },
    });
  }
}
</code></pre>

<h1 id="why-this-works">Why This Works</h1>
<p><strong>The sandwich:</strong> DB read at the top, DB write at the bottom,<br />

<h1 id="sociable-tests----the-middle-ground">Sociable Tests -- The Middle Ground</h1>
<p>Two extremes that both have problems:</p>
<table>
<thead>
<tr>
<th>Approach</th>
<th>Problem</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Mock everything</strong></td>
<td>Tests pass but app is broken</td>
</tr>
<tr>
<td><strong>Test everything end-to-end</strong></td>
<td>Slow, fragile, hard to debug</td>
</tr>
</tbody>
</table>
<p><strong>Sociable tests:</strong> test one piece of code, but let it call<br />
its <strong>real dependencies</strong> instead of faking them.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  A's tests --&gt; A calls real B --&gt; proves A uses B correctly
  B's tests --&gt; B calls real C --&gt; proves B uses C correctly
  Together  --&gt; the whole chain is covered
</code></pre>
<p>Each test is <strong>focused</strong> (you know what broke),<br />
but uses <strong>real code</strong> underneath (you catch real bugs).</p>
</section>

<h1 id="nullables">Nullables</h1>

<h1 id="the-takeaway-separate-logic-from-infrastructure">The Takeaway: Separate Logic from Infrastructure</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-comment">// BAD -- logic buried in the shell, needs mocks to test</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">awardXP</span>(<span class="hljs-params">participantId, difficulty</span>) {
  <span class="hljs-keyword">const</span> xp = difficulty === <span class="hljs-string">&#x27;HARD&#x27;</span> ? <span class="hljs-number">150</span> : <span class="hljs-number">100</span>; <span class="hljs-comment">// Logic here!</span>
  <span class="hljs-keyword">await</span> prisma.<span class="hljs-property">participant</span>.<span class="hljs-title function_">update</span>({
    <span class="hljs-attr">data</span>: { <span class="hljs-attr">totalXP</span>: { <span class="hljs-attr">increment</span>: xp } },
  });
}

<span class="hljs-comment">// GOOD -- logic extracted, testable without mocks</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">calculateEffectiveXP</span>(<span class="hljs-params">amount, multiplier = <span class="hljs-number">1.0</span></span>) {
  <span class="hljs-keyword">return</span> <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>(amount * multiplier);     <span class="hljs-comment">// Pure!</span>
}

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">awardXP</span>(<span class="hljs-params">participantId, amount, multiplier</span>) {
  <span class="hljs-keyword">const</span> effective = <span class="hljs-title function_">calculateEffectiveXP</span>(amount, multiplier);
  <span class="hljs-keyword">await</span> prisma.<span class="hljs-property">participant</span>.<span class="hljs-title function_">update</span>({
    <span class="hljs-attr">data</span>: { <span class="hljs-attr">totalXP</span>: { <span class="hljs-attr">increment</span>: effective } },
  });
}
</code></pre>
<p>Extract the <strong>thinking</strong> into pure functions. Keep the shell <strong>thin</strong>.</p>

<h1 id="key-takeaways">Key Takeaways</h1>
<ol>
<li><strong>Vim</strong> forces you to think before you edit -- making you faster</li>
<li><strong>TDD</strong> forces you to define behavior before coding -- catching bugs early</li>
<li><strong>AI without TDD</strong> is dangerous -- fast but unverified</li>
<li><strong>Mocks test implementation</strong> -- real tests test behavior</li>
<li><strong>Pure functions</strong> are trivially testable -- extract your logic</li>
<li><strong>Integration tests</strong> catch real bugs -- use a real database</li>
</ol>
